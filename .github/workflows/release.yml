name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o kubermatic-downloader_${{ matrix.goos }}_${{ matrix.goarch }} \
            ./cmd/

      - uses: actions/upload-artifact@v4
        with:
          name: kubermatic-downloader_${{ matrix.goos }}_${{ matrix.goarch }}
          path: kubermatic-downloader_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum kubermatic-downloader_* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            kubermatic-downloader_*
            checksums.txt
          generate_release_notes: true
